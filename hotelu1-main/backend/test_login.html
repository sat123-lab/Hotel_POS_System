<!DOCTYPE html>
<html>
<head>
    <title>Login Test</title>
</head>
<body>
    <h1>Login API Test</h1>
    
    <h2>Test Valid Logins:</h2>
    <button onclick="testLogin('admin', 'admin')">Test Admin Login</button>
    <button onclick="testLogin('waiter', 'pass')">Test Waiter Login</button>
    <button onclick="testLogin('chef', 'pass1')">Test Chef Login</button>
    <button onclick="testLogin('manager', 'pass2')">Test Manager Login</button>
    
    <h2>Test Invalid Login:</h2>
    <button onclick="testLogin('invalid', 'wrong')">Test Invalid Login</button>
    
    <h2>Results:</h2>
    <pre id="results"></pre>
    
    <script>
        async function testLogin(username, password) {
            const results = document.getElementById('results');
            results.textContent = 'Testing...';
            
            try {
                const response = await fetch('http://localhost:3002/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                results.textContent = `Status: ${response.status}\nResponse: ${JSON.stringify(data, null, 2)}`;
                
                if (data.success) {
                    results.textContent += '\n\n✅ LOGIN SUCCESSFUL!';
                    results.style.color = 'green';
                } else {
                    results.textContent += '\n\n❌ LOGIN FAILED!';
                    results.style.color = 'red';
                }
            } catch (error) {
                results.textContent = `Error: ${error.message}`;
                results.style.color = 'red';
            }
        }
    </script>
</body>
</html>
